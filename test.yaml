port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
proxies: 
# 自建節點信息填入此處
    - { name: 'My VPS', type: ss, server: 8.8.8.8, port: '88', cipher: aes-256-gcm, password: password}

proxy-providers:
  CMUni:   # 此處是Airport命名
    type: http
    url:  https://api.sublink.dev/sub?target=clash&url=https%3A%2F%2Fxn--mesr8b36xr0o.com%2Fapi%2Fv1%2Fclient%2Fsubscribe%3Ftoken%3D3cff47ce97481423fe8c242bb0718ce4&insert=false&emoji=true&list=true&tfo=false&scv=false&fdn=false&sort=false&new_name=true # 填入Airport節點信息（找一個訂閱轉換的網站，⽐如sublink.dev，粘貼訂閱鏈接，客戶端選Clash ，點擊進階選項，熒幕左下角處勾選“轉換為 NodeList”，最後生成訂閱鏈接並粘貼至此處）
    path: ./Proxy/Airport.yml  # 此處自行命名
    interval: 86400
    health-check:
      enable: false
      interval: 600
      url: https://www.gstatic.com/generate_204
  美國:   # 此處可以單獨篩選Airport部分節點並自行命名，以美國舉例，此處篩選出的是該Airport內所有美國節點
    type: file
    path: ./Proxy/Airport.yml  # 此處自行命名
    filter: "US|美國"    #正則表達式
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
    - { name: '🚀 節點選擇', type: select, proxies: [DIRECT, '⚡ 最低延遲', '♻️ Private Relay|節點選擇', '♻️ Private Relay|最低延遲', '♻️ Private Relay|美國', 'My VPS'] }
    - name: ♻️ Private Relay|節點選擇   # 用於手動選擇想要的Airport線路，並將流量轉發至My VPS
      type: relay
      proxies:
        - ‍✈ Jichang
    - name: ♻️ Private Relay|最低延遲   # 用於自動選擇最低延遲的線路，並將流量轉發至My VPS
      type: relay
      proxies:
        - ⚡ 最低延遲
    - name: ♻️ Private Relay|美國   # 用於自動選擇最低延遲的美國線路，並將流量轉發至My VPS
      type: relay
      proxies:
        - ⚡ 最低延遲|美國
    - name: "⚡ 最低延遲"   # 用於自動選擇最低延遲的線路，不轉發流量至My VPS
      type: url-test
      use:
        - Airport
      url: 'https://www.gstatic.com/generate_204'
      interval: 300
      tolerance: 50
    - name: "⚡ 最低延遲|美國"   # 用於自動選擇最低延遲的美國線路，不轉發流量至My VPS
