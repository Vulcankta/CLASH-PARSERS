parsers: # array
  # - reg: ^.*$ 匹配所有訂閱，或  - url: https://example.com/profile.yaml 指定訂閱
  - reg: ^.*$
  # 刪除服務商提供的策略組和規則
    code: |
      module.exports.parse = (raw, { yaml }) => {
        const rawObj = yaml.parse(raw)
        const groups = []
        const rules = []
        return yaml.stringify({ ...rawObj, 'proxy-groups': groups, rules })
      } 
  # 建立自己的配置
    yaml:
      prepend-proxy-groups: # 建立策略組
        - name: 🔯 代理模式 
          type: select
          proxies:
            - 黑名單 # 黑名單模式，意為「只有命中規則的網絡流量，才使用代理」
            - 繞過大陸 # 繞過大陸模式，意為「沒有命中規則的網絡流量，統統使用代理」
            
        - name: 🔰 選擇節點 
          type: url-test
          url: https://www.apple.com/library/test/success.html
          interval: 180
          tolerance: 200
          lazy: false
          disable-udp: false
            
        - name: 🛑 廣告攔截
          type: select
          proxies:
            - DIRECT
            - REJECT
            - PROXY
            
        - name: 黑名單
          type: select
          proxies:
            - DIRECT
            
        - name: 繞過大陸
          type: select
          proxies:
            - PROXY
            
        - name: PROXY
          type: select
          proxies:
            - 🔰 選擇節點
            
  # 策略組示例
       # - name: 分組名
         # type: select       # 手動選點   
               # url-test     # 自動選擇延遲最低的節點
               # fallback     # 節點故障時自動切換下一個
               # laod-balance # 均衡使用分組內的節點
         # url: http://www.gstatic.com/generate_204 # 測試地址 非select類型分組必要
         # interval: 300 # 自動測試間隔時間，單位秒 非select類型分組必要
         # tolerance: 50 # 允許的偏差，節點之間延遲差小於該值不切換 非必要
         # proxies:  
           # - 節點名稱或其他分組套娃
          
      commands:
        - proxy-groups.🔰 選擇節點.proxies=[]proxyNames # 向指定策略組添加訂閱中的節點名，可使用正則過濾
        - proxy-groups.🔰 選擇節點.proxies.0+DIRECT # 向指定分組第一個位置添加一個 DIRECT 節點名
        
        # 一些可能用到的正則過濾節點示例，使分組更細緻
        # []proxyNames|a                         # 包含a
        # []proxyNames|^(.*)(a|b)+(.*)$          # 包含a或b
        # []proxyNames|^(?=.*a)(?=.*b).*$        # 包含a和b
        # []proxyNames|^((?!b).)*a((?!b).)*$     # 包含a且不包含b
        # []proxyNames|^((?!b|c).)*a((?!b|c).)*$ # 包含a且不包含b或c
        
  # 添加規則
      prepend-rules: # 規則由上往下遍歷，如上面規則已經命中，則不再往下處理
